name: Backend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            cd ~/BORA_INVENTORY
            # Get the current commit before pulling
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main
            
            # Check if requirements.txt has changed
            if git diff --name-only $PREV_COMMIT HEAD | grep -q "backend/requirements.txt"; then
              echo "Requirements changed. Updating dependencies..."
              cd backend
              ./venv/bin/pip install -r requirements.txt
              cd ..
            else
              echo "Requirements unchanged. Skipping pip install."
            fi
            
            # Always restart the service to apply code changes
            sudo systemctl restart bora-backend
            
            # FORCE-OVERWRITE Nginx config to resolve 405 error
            echo "Applying final Nginx configuration fix..."
            sudo tee /etc/nginx/sites-available/default << 'EOF'
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;

    server_name _;

    # Proxy API requests to the FastAPI backend
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the React frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable large uploads for product images
    client_max_body_size 100M;
}
EOF
            # Ensure the config is enabled and valid
            sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl restart nginx
            echo "Nginx configuration successfully overwritten and restarted."
