name: Backend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            if [ ! -d "~/BORA_INVENTORY" ]; then
              echo "Server setup: Installing system dependencies..."
              sudo apt update
              sudo apt install -y python3-venv python3-pip
              git clone https://github.com/rutujak-bora/BORA_INVENTORY.git ~/BORA_INVENTORY
            fi
            
            # Create the .env file automatically
            echo "Creating .env file..."
            cat << 'ENVEOF' > ~/BORA_INVENTORY/backend/.env
ACCESS_TOKEN_EXPIRE_MINUTES=90
CORS_ORIGINS=http://13.50.236.19,http://localhost:3000,http://127.0.0.1:3000
DB_NAME=bora_inventory_mongo
JWT_ALGORITHM=HS256
JWT_SECRET_KEY=bora_secret_key_change_in_production_2025
MONGO_URL=mongodb+srv://rutujak_db_user:i5DpW7YHUtGCvMys@boratech.wwvkwf9.mongodb.net/bora_inventory_mongo
GEMINI_API_KEY=AIzaSyBmlTpe1iyXNdM6rdINNhYHCte8RdcWN0I
ENVEOF

            cd ~/BORA_INVENTORY
            git pull origin main
            
            echo "Setting up Python environment and installing dependencies..."
            cd backend
            python3 -m venv venv
            ./venv/bin/pip install -r requirements.txt
            cd ..
            
            # Create systemd service if it doesn't exist
            if [ ! -f "/etc/systemd/system/bora-backend.service" ]; then
              echo "Creating bora-backend.service..."
              sudo tee /etc/systemd/system/bora-backend.service << 'EOF'
[Unit]
Description=Bora DMS Backend
After=network.target

[Service]
User=ubuntu
Group=ubuntu
WorkingDirectory=/home/ubuntu/BORA_INVENTORY/backend
ExecStart=/home/ubuntu/BORA_INVENTORY/backend/venv/bin/python -m uvicorn server:app --host 0.0.0.0 --port 8000
Restart=always

[Install]
WantedBy=multi-user.target
EOF
              sudo systemctl daemon-reload
              sudo systemctl enable bora-backend
            fi
            
            # Always restart the service to apply code changes
            sudo systemctl restart bora-backend
            
            # Export logs so I can read them remotely to debug the 502 error
            sleep 5
            sudo journalctl -u bora-backend -n 100 --no-pager | sudo tee /var/www/html/backend_error_log.txt
            
            # FORCE-OVERWRITE Nginx config to resolve 405 error
            echo "Applying final Nginx configuration fix..."
            sudo tee /etc/nginx/sites-available/default << 'EOF'
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;

    server_name _;

    # Proxy API requests to the FastAPI backend
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the React frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable large uploads for product images
    client_max_body_size 100M;
}
EOF
            # Ensure the config is enabled and valid
            sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl restart nginx
            echo "Nginx configuration successfully overwritten and restarted."
