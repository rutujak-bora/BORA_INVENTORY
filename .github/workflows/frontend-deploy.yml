name: Frontend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
        
      - name: Build Production Bundle
        env:
          REACT_APP_BACKEND_URL: http://${{ secrets.BACKEND_IP }}:8000
          CI: false
        run: |
          cd frontend
          npm run build
          tar -czf build.tar.gz build/
        
      - name: Upload Build Artifacts to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          source: "frontend/build.tar.gz"
          target: "/home/ubuntu/temp-build"
          strip_components: 1

      - name: Deploy static files and update Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            sudo rm -rf /home/ubuntu/temp-build/extracted
            mkdir -p /home/ubuntu/temp-build/extracted
            tar -xzf /home/ubuntu/temp-build/build.tar.gz -C /home/ubuntu/temp-build/extracted
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/temp-build/extracted/build/* /var/www/html/
            
            # Apply Nginx Bridge Configuration
            sudo tee /etc/nginx/sites-available/bora-frontend << 'EOF'
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    root /var/www/html;
    index index.html;
    server_name _;
    location /api {
        proxy_pass http://51.20.53.33:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
EOF
            sudo ln -sf /etc/nginx/sites-available/bora-frontend /etc/nginx/sites-enabled/bora-frontend
            sudo systemctl restart nginx
            sudo rm -rf /home/ubuntu/temp-build/*
