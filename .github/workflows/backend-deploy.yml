name: Backend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            cd ~/BORA_INVENTORY
            # Get the current commit before pulling
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main
            
            # Check if requirements.txt has changed
            if git diff --name-only $PREV_COMMIT HEAD | grep -q "backend/requirements.txt"; then
              echo "Requirements changed. Updating dependencies..."
              cd backend
              ./venv/bin/pip install -r requirements.txt
            else
              echo "Requirements unchanged. Skipping pip install."
            fi
            
            # Always restart the service to apply code changes
            sudo systemctl restart bora-backend
