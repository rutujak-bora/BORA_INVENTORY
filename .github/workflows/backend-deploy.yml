name: Backend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            cd ~/BORA_INVENTORY
            # Get the current commit before pulling
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main
            
            # Check if requirements.txt has changed
            if git diff --name-only $PREV_COMMIT HEAD | grep -q "backend/requirements.txt"; then
              echo "Requirements changed. Updating dependencies..."
              cd backend
              ./venv/bin/pip install -r requirements.txt
              cd ..
            else
              echo "Requirements unchanged. Skipping pip install."
            fi
            
            # Always restart the service to apply code changes
            sudo systemctl restart bora-backend
            
            # Fix Nginx to ensure it proxies /api correctly for POST requests
            # This is a defensive fix to prevent 405 Not Allowed errors
            if [ -f /etc/nginx/sites-available/default ]; then
              echo "Updating Nginx configuration..."
              # Ensure /api is proxied to the backend
              if ! grep -q "location /api" /etc/nginx/sites-available/default; then
                sudo sed -i '/location \/ {/i \    location /api {\n        proxy_pass http://localhost:8000;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    }\n' /etc/nginx/sites-available/default
              fi
              sudo systemctl restart nginx
            fi
