name: Backend Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            cd ~/BORA_INVENTORY
            # Get the current commit before pulling
            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main
            
            # Check if requirements.txt has changed
            if git diff --name-only $PREV_COMMIT HEAD | grep -q "backend/requirements.txt"; then
              echo "Requirements changed. Updating dependencies..."
              cd backend
              ./venv/bin/pip install -r requirements.txt
              cd ..
            else
              echo "Requirements unchanged. Skipping pip install."
            fi
            
            # Always restart the service to apply code changes
            sudo systemctl restart bora-backend
            
            # AGGRESSIVE Nginx fix for POST requests on IP address
            echo "Attempting to fix Nginx 405 error..."
            # Find which file contains the server block for port 80
            NGINX_CONF=$(grep -l "listen 80" /etc/nginx/sites-enabled/* | head -n 1)
            
            if [ -n "$NGINX_CONF" ] && [ -f "$NGINX_CONF" ]; then
              echo "Found Nginx config at $NGINX_CONF. Updating..."
              # Ensure /api is proxied to the backend and handles POST
              if ! grep -q "location /api" "$NGINX_CONF"; then
                sudo sed -i '/server_name/a \    location /api {\n        proxy_pass http://127.0.0.1:8000;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n' "$NGINX_CONF"
              fi
              sudo nginx -t && sudo systemctl restart nginx
              echo "Nginx updated and restarted."
            else
              echo "Could not find Nginx config file with listen 80."
            fi
